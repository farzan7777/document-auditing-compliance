<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>OpenEnv · API Reference</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui.css"/>
  <style>
    :root {
      --bg: #0a0c10;
      --surface: #0f1318;
      --surface2: #161b24;
      --border: #1e2736;
      --border2: #253040;
      --accent: #00d4ff;
      --green: #00e676;
      --yellow: #ffcc00;
      --red: #ff5252;
      --text: #e8edf4;
      --text2: #8a9bb0;
      --text3: #4a5a6e;
      --mono: 'Space Mono', monospace;
      --sans: 'DM Sans', sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      background: var(--bg) !important;
      color: var(--text) !important;
      font-family: var(--sans) !important;
      margin: 0;
    }

    /* Grid bg */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.025) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── TOPBAR ── */
    .swagger-ui .topbar {
      background: var(--surface) !important;
      border-bottom: 1px solid var(--border) !important;
      padding: 12px 24px !important;
    }

    .swagger-ui .topbar .topbar-wrapper {
      display: flex !important;
      align-items: center !important;
      gap: 16px !important;
    }

    .swagger-ui .topbar .topbar-wrapper a {
      font-family: var(--mono) !important;
      font-size: 14px !important;
      font-weight: 700 !important;
      color: var(--accent) !important;
      text-decoration: none !important;
      letter-spacing: 1px !important;
    }

    .swagger-ui .topbar .topbar-wrapper a::before {
      content: '📋 OpenEnv · ';
      color: var(--text2);
      font-weight: 400;
    }

    .swagger-ui .topbar img { display: none !important; }

    .swagger-ui .topbar .download-url-wrapper { display: none !important; }

    /* ── WRAPPER ── */
    .swagger-ui {
      font-family: var(--sans) !important;
      color: var(--text) !important;
      position: relative;
      z-index: 1;
    }

    .swagger-ui .wrapper { max-width: 1100px !important; padding: 0 24px !important; }

    /* ── INFO SECTION (CYBERPUNK 3D) ── */
    .swagger-ui .info {
      background: rgba(15, 19, 24, 0.7) !important;
      backdrop-filter: blur(12px) !important;
      border: 1px solid rgba(0, 212, 255, 0.2) !important;
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.4), inset 0 0 20px rgba(0, 212, 255, 0.05) !important;
      padding: 28px 32px !important;
      margin: 24px 0 !important;
      position: relative;
    }

    .swagger-ui .info::after {
      content: '';
      position: absolute;
      top: -1px; left: -1px; right: -1px; height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), var(--red), transparent);
      opacity: 0.6;
    }

    .swagger-ui .info .title {
      font-family: var(--mono) !important;
      font-size: 20px !important;
      font-weight: 700 !important;
      color: var(--accent) !important;
      letter-spacing: -0.5px !important;
      text-shadow: 0 0 10px rgba(0, 212, 255, 0.5) !important;
    }

    .swagger-ui .info .title small {
      font-size: 12px !important;
      color: var(--text3) !important;
      font-family: var(--mono) !important;
      font-weight: 400 !important;
      margin-left: 10px;
    }

    .swagger-ui .info p {
      color: var(--text2) !important;
      font-size: 14px !important;
      font-family: var(--sans) !important;
      line-height: 1.6 !important;
    }

    /* ── OPERATION BLOCKS (CYBERPUNK 3D) ── */
    .swagger-ui .opblock {
      background: rgba(15, 19, 24, 0.8) !important;
      backdrop-filter: blur(8px) !important;
      border: 1px solid var(--border) !important;
      margin: 12px 0 !important;
      border-radius: 0 !important;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s ease, border-color 0.3s ease !important;
      transform-style: preserve-3d !important;
      perspective: 1000px !important;
      animation: float 6s ease-in-out infinite;
    }

    .swagger-ui .opblock:hover {
      transform: translateY(-4px) rotateX(2deg) rotateY(-1deg) scale(1.01) !important;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 20px rgba(0, 212, 255, 0.1) !important;
      border-color: var(--accent) !important;
      z-index: 10;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }

    .swagger-ui .opblock-get { border-left: 4px solid var(--accent) !important; border-image: linear-gradient(to bottom, var(--accent), #7c3aed) 1 !important; }
    .swagger-ui .opblock-post { border-left: 4px solid var(--green) !important; border-image: linear-gradient(to bottom, var(--green), #00d4ff) 1 !important; }
    .swagger-ui .opblock-put { border-left: 4px solid var(--yellow) !important; }
    .swagger-ui .opblock-delete { border-left: 4px solid var(--red) !important; }

    .swagger-ui .opblock .opblock-summary {
      background: transparent !important;
      padding: 0 !important;
    }

    .swagger-ui .opblock .opblock-summary-control {
      padding: 12px 16px !important;
      display: flex !important;
      align-items: center !important;
      gap: 12px !important;
    }

    .swagger-ui .opblock .opblock-summary-method {
      font-family: var(--mono) !important;
      font-size: 10px !important;
      font-weight: 700 !important;
      letter-spacing: 1.5px !important;
      min-width: 52px !important;
      text-align: center !important;
      padding: 5px 8px !important;
      border-radius: 0 !important;
      text-shadow: 0 0 5px currentColor;
    }

    .swagger-ui .opblock-get .opblock-summary-method { background: rgba(0,212,255,0.12) !important; color: var(--accent) !important; }
    .swagger-ui .opblock-post .opblock-summary-method { background: rgba(0,230,118,0.12) !important; color: var(--green) !important; }

    .swagger-ui .opblock .opblock-summary-path {
      font-family: var(--mono) !important;
      font-size: 13px !important;
      color: var(--text) !important;
    }

    .swagger-ui .opblock .opblock-summary-description {
      font-size: 12px !important;
      color: var(--text2) !important;
    }

    .swagger-ui .opblock .opblock-body {
      background: rgba(22, 27, 36, 0.9) !important;
      border-top: 1px solid var(--border) !important;
    }

    /* ── TAGS ── */
    .swagger-ui .opblock-tag {
      font-family: var(--mono) !important;
      font-size: 12px !important;
      letter-spacing: 2px !important;
      text-transform: uppercase !important;
      color: var(--text3) !important;
      border-bottom: 1px solid var(--border) !important;
      padding: 14px 0 !important;
      background: transparent !important;
    }

    /* ── BUTTONS ── */
    .swagger-ui .btn {
      font-family: var(--mono) !important;
      font-size: 11px !important;
      letter-spacing: 1px !important;
      border-radius: 0 !important;
      text-transform: uppercase !important;
      transition: all 0.2s;
    }

    .swagger-ui .btn.execute {
      background: var(--accent) !important;
      color: #000 !important;
      border: none !important;
      font-weight: 700 !important;
      padding: 8px 20px !important;
      box-shadow: 0 0 10px rgba(0,212,255,0.3);
    }

    .swagger-ui .btn.execute:hover { background: #33ddff !important; box-shadow: 0 0 20px rgba(0,212,255,0.5) !important; }

    .swagger-ui .btn.authorize {
      background: transparent !important;
      color: var(--green) !important;
      border: 1px solid var(--green) !important;
    }

    /* ── INPUTS ── */
    .swagger-ui input[type=text], .swagger-ui textarea, .swagger-ui select {
      background: var(--bg) !important;
      border: 1px solid var(--border2) !important;
      color: var(--text) !important;
      font-family: var(--mono) !important;
      border-radius: 0 !important;
    }

    /* ── TABLES ── */
    .swagger-ui table thead tr th {
      background: var(--surface) !important;
      color: var(--text3) !important;
      font-family: var(--mono) !important;
      font-size: 10px !important;
      border-bottom: 1px solid var(--border) !important;
    }

    .swagger-ui .responses-wrapper {
      background: transparent !important;
    }

    /* ── MICROLIGHT (JSON) ── */
    .swagger-ui .microlight, .swagger-ui pre.microlight {
      background: #050709 !important;
      border: 1px solid var(--border) !important;
      color: #7ec8e3 !important;
      font-family: var(--mono) !important;
      padding: 16px !important;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
    }

    /* ── MODELS ── */
    .swagger-ui section.models {
      background: var(--surface) !important;
      border: 1px solid var(--border) !important;
      margin-top: 30px !important;
    }

    .swagger-ui section.models .model-container {
      background: var(--surface2) !important;
      margin: 10px !important;
      border: 1px solid var(--border) !important;
    }

    /* ── BACK LINK ── */
    .back-bar {
      position: relative;
      z-index: 2;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      padding: 8px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .back-bar a {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text2);
      text-decoration: none;
      letter-spacing: 1px;
    }

    .back-bar a:hover { color: var(--accent); }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { 
      background: linear-gradient(to bottom, var(--accent), var(--red)); 
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <div class="back-bar">
    <a href="/">← Environment Dashboard</a>
    <span style="color:var(--text3)">/</span>
    <a href="/docs" style="color:var(--accent)">API Reference</a>
  </div>
  <div id="swagger-ui"></div>

  <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui-standalone-preset.js"></script>
  <script>
    SwaggerUIBundle({
      url: "/openapi.json",
      dom_id: '#swagger-ui',
      presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
      layout: "StandaloneLayout",
      deepLinking: true,
      displayRequestDuration: true,
      defaultModelsExpandDepth: 1,
      defaultModelExpandDepth: 1,
      docExpansion: 'list',
      filter: true,
      syntaxHighlight: {
        activate: true,
        theme: "monokai"
      }
    });
  </script>
</body>
</html>
